name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release
        run: |
          xcodebuild -project PDFFusion.xcodeproj \
            -scheme PDFFusion \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            build

      - name: Create DMG
        run: |
          brew install create-dmg
          
          APP_DIR="build/Build/Products/Release"
          
          # create-dmg may return exit code 2 if it can't set background, but DMG is still valid
          create-dmg \
            --volname "PDF Fusion" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "PDF Fusion.app" 150 190 \
            --hide-extension "PDF Fusion.app" \
            --app-drop-link 450 190 \
            "PDFFusion-${GITHUB_REF_NAME}.dmg" \
            "$APP_DIR/PDF Fusion.app" || true
          
          # Verify DMG was created
          ls -la PDFFusion-*.dmg

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: PDFFusion-*.dmg
          generate_release_notes: true
          draft: false
